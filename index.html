<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Liga manager – sloučená verze</title>
  <style>
    :root{--bg:#0b1220;--card:#121a2b;--muted:#9fb0d0;--text:#e8efff;--accent:#6aa7ff;--line:#24314e;--success:#1d6b46;--danger:#7a2030}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#081022,#0b1220);color:var(--text)}
    .wrap{max-width:1380px;margin:0 auto;padding:18px}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{background:rgba(18,26,43,.92);border:1px solid var(--line);border-radius:18px;padding:14px}
    h1{font-size:22px;margin:0 0 12px} h2{margin:0 0 8px;font-size:16px} .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input,select,button,textarea{border-radius:12px;border:1px solid var(--line);background:#0b1326;color:var(--text);padding:10px 12px;font-size:14px}
    button{cursor:pointer;background:linear-gradient(180deg,#1a2b52,#132441)} button.secondary{background:#0b1326} button.success{background:linear-gradient(180deg,#1f6b46,#14472f)} button.danger{background:linear-gradient(180deg,#5a1f2b,#3c1420)}
    .muted,.small{color:var(--muted)} .small{font-size:12px}.ok{color:#8cffb0}.warn{color:#ffd28c}
    .table{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:16px;overflow:hidden}.table th,.table td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:center;font-size:13px}.table th{background:#0b1326;color:#cfe0ff}.table td.left,.table td.team{text-align:left}
    .leader-box{display:flex;gap:10px;align-items:center;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#0b1326;margin-bottom:10px}.leader-empty{color:var(--muted);font-size:13px}.leader-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.leader-name{font-size:18px;font-weight:700}.leader-meta{font-size:13px;color:#cfe0ff}
    .matches{display:grid;gap:8px}.match{display:grid;grid-template-columns:95px 100px 1fr auto 1fr auto auto auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:10px;background:#0b1326}.time-badge,.pitch-badge,.tag,.chip{font-size:12px;color:#cfe0ff;background:#101b33;border:1px solid var(--line);border-radius:999px;padding:6px 8px}.match .t1{text-align:right}.match .t2{text-align:left}.score{width:64px;text-align:center}.inline-editor{display:none;border-top:1px dashed var(--line);padding-top:10px;margin-top:10px;grid-column:1/-1}.inline-editor.open{display:block}.inline-form{display:grid;grid-template-columns:1.4fr 1fr 110px auto auto;gap:8px;align-items:end}.inline-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px}.tiny-btn{padding:6px 9px;font-size:12px;border-radius:10px}
    .report-topline{margin:0 0 18px;font-size:14px;font-weight:700;color:#222}
    @media(min-width:980px){.grid{grid-template-columns:420px 1fr}}
    @media(max-width:900px){.inline-form{grid-template-columns:1fr}.match{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Správce ligy — sloučená verze</h1>
  <div class="grid">
    <div class="card">
      <div class="row">
        <input id="teamName" placeholder="Název týmu…" style="flex:1" />
        <button id="addTeamBtn" type="button">Přidat</button>
      </div>
      <div class="row" style="margin-top:10px">
        <button id="generateBtn" type="button">Vygenerovat zápasy</button>
        <button id="exportPdfBtn" type="button" class="secondary">Export PDF</button>
        <button id="exportHtmlBtn" type="button" class="secondary">Export HTML</button>
      </div>
      <div id="status" class="small" style="margin-top:10px"></div>
    </div>

    <div class="card" id="pdfArea">
      <h2>Střelci gólů</h2>
      <div class="leader-box" id="topScorerBox"></div>
      <table class="table" id="scorersTable">
        <thead><tr><th>Poř.</th><th style="text-align:left">Hráč</th><th style="text-align:left">Tým</th><th>Góly</th></tr></thead>
        <tbody></tbody>
      </table>
      <h2 style="margin-top:14px">Zápasy</h2>
      <div class="matches" id="matches"></div>
    </div>
  </div>
</div>

<script>
const state = {
  teams: ['Tým A','Tým B'],
  rounds: [{matches:[{id:'m1',home:'Tým A',away:'Tým B',hs:'2',as:'1',pitch:1,slotStart:'09:00',slotEnd:'09:12'}]}],
  scorers: [
    {id:'s1',name:'Hráč A1',team:'Tým A',goals:1,byMatch:{m1:1}},
    {id:'s2',name:'Hráč A2',team:'Tým A',goals:1,byMatch:{m1:1}},
    {id:'s3',name:'Hráč B1',team:'Tým B',goals:1,byMatch:{m1:1}}
  ]
};

const elMatches = document.getElementById('matches');
const elScorersBody = document.querySelector('#scorersTable tbody');
const elTopScorerBox = document.getElementById('topScorerBox');
const elStatus = document.getElementById('status');

function clampInt(value, min, max, fallback){ const n = parseInt(value,10); return Number.isNaN(n) ? fallback : Math.min(max, Math.max(min, n)); }
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function normalizeName(s){ return String(s || '').trim().replace(/\s+/g, ' '); }
function scorerKey(name, team){ return `${normalizeName(name).toLowerCase()}||${normalizeName(team).toLowerCase()}`; }
function setStatus(msg, kind=''){ elStatus.className = `small ${kind}`; elStatus.textContent = msg; }
function getFlatMatches(){ return state.rounds.flatMap((rd, roundIndex) => rd.matches.map(m => ({...m, roundIndex}))); }
function getTopScorerOverall(){ const sorted=[...state.scorers].sort((a,b)=>(b.goals-a.goals)||a.team.localeCompare(b.team,'cs')||a.name.localeCompare(b.name,'cs')); return sorted.length?sorted[0]:null; }
function getScoreForMatch(matchId){ for(const round of state.rounds){ const match=(round.matches||[]).find(m=>m.id===matchId); if(match){ return {home:match.home,away:match.away,hs:clampInt(match.hs,0,999,0),as:clampInt(match.as,0,999,0)}; } } return null; }
function getScorerTotalsForMatch(matchId){ const totals={}; state.scorers.forEach(s=>{ const count=clampInt(s.byMatch?.[matchId],0,999,0); if(count>0) totals[s.team]=(totals[s.team]||0)+count; }); return totals; }
function validateScorersAgainstScores(){ const issues=[]; getFlatMatches().forEach(match=>{ const hsRaw=String(match.hs??'').trim(); const asRaw=String(match.as??'').trim(); if(hsRaw===''&&asRaw==='') return; const hs=clampInt(match.hs,0,999,0); const as=clampInt(match.as,0,999,0); const totals=getScorerTotalsForMatch(match.id); const homeGoals=totals[match.home]||0; const awayGoals=totals[match.away]||0; if(homeGoals!==hs||awayGoals!==as){ issues.push(`${match.home} vs ${match.away} (${hs}:${as}) — střelci ${homeGoals}:${awayGoals}`); } }); return issues; }
function getScorerByNameTeam(name, team){ const key = scorerKey(name, team); return state.scorers.find(s => scorerKey(s.name, s.team) === key); }
async function updateScorer(deltaDirection, matchId=null, teamsForMatch=null, nameOverride=null, teamOverride=null, goalsOverride=null){
  const name = normalizeName(nameOverride || ''); const team = normalizeName(teamOverride || ''); const goals = clampInt(goalsOverride,1,999,1);
  if(!name || !team) return;
  let scorer = getScorerByNameTeam(name, team);
  if(!scorer && deltaDirection < 0) return;
  if(!scorer){ scorer = { id: 'id_' + Math.random().toString(16).slice(2), name, team, goals: 0, byMatch: {} }; state.scorers.push(scorer); }
  scorer.goals = Math.max(0, scorer.goals + (goals * deltaDirection));
  if(matchId){ const current = clampInt(scorer.byMatch[matchId], 0, 999, 0); const next = Math.max(0, current + (goals * deltaDirection)); if(next === 0) delete scorer.byMatch[matchId]; else scorer.byMatch[matchId] = next; }
  state.scorers = state.scorers.filter(s => s.goals > 0);
  renderScorers(); renderMatches();
}
async function autofillScorersFromScore(matchId, team){
  const info = getScoreForMatch(matchId); if(!info || !team) return;
  const targetGoals = team === info.home ? info.hs : info.as;
  const totals = getScorerTotalsForMatch(matchId);
  const currentGoals = totals[team] || 0;
  if(currentGoals >= targetGoals){ setStatus(`Pro tým ${team} už jsou střelci vyplněni (${currentGoals}/${targetGoals}).`, 'warn'); return; }
  const name = `${team} – gól ${currentGoals + 1}`;
  await updateScorer(1, matchId, [info.home, info.away], name, team, 1);
  setStatus('Střelec byl rychle doplněn.', 'ok');
}
function renderTopScorer(){ const top = getTopScorerOverall(); if(!top){ elTopScorerBox.innerHTML = '<div class="leader-empty">Zatím nejsou zadaní žádní střelci.</div>'; return; } const ties = state.scorers.filter(s => s.goals === top.goals).length; elTopScorerBox.innerHTML = `<div>⚽</div><div><div class="leader-title">Nejlepší střelec</div><div class="leader-name">${escapeHtml(top.name)}</div><div class="leader-meta">${escapeHtml(top.team)} · ${top.goals} gólů${ties > 1 ? ` · dělené 1. místo (${ties} hráči)` : ''}</div></div>`; }
function renderScorers(){ elScorersBody.innerHTML=''; [...state.scorers].sort((a,b)=>(b.goals-a.goals)||a.team.localeCompare(b.team,'cs')||a.name.localeCompare(b.name,'cs')).forEach((s,idx)=>{ const tr=document.createElement('tr'); tr.innerHTML=`<td>${idx+1}</td><td class="left">${escapeHtml(s.name)}</td><td class="left"><span class="tag">${escapeHtml(s.team)}</span></td><td><strong>${s.goals}</strong></td>`; elScorersBody.appendChild(tr); }); renderTopScorer(); }
function renderMatches(){ elMatches.innerHTML=''; getFlatMatches().forEach(item=>{ const row=document.createElement('div'); row.className='match'; row.innerHTML=`<div class="time-badge">${item.slotStart}–${item.slotEnd}</div><div class="pitch-badge">Hřiště ${item.pitch}</div><div class="t1">${escapeHtml(item.home)}</div><div>vs</div><div class="t2">${escapeHtml(item.away)}</div><input class="score" value="${escapeHtml(item.hs)}" disabled /><input class="score" value="${escapeHtml(item.as)}" disabled /><button type="button" class="secondary tiny-btn" data-match-scorers="${item.id}">Střelci</button><div class="inline-editor" id="editor-${item.id}"><div class="row" style="margin-top:8px"><button type="button" class="secondary tiny-btn" data-autofill-home="${item.id}">+1 ${escapeHtml(item.home)}</button><button type="button" class="secondary tiny-btn" data-autofill-away="${item.id}">+1 ${escapeHtml(item.away)}</button><span class="small">Rychlé doplnění střelců podle zadaného skóre.</span></div><div class="inline-list" id="chips-${item.id}"></div></div>`; elMatches.appendChild(row); const toggleBtn=row.querySelector(`[data-match-scorers="${item.id}"]`); const editor=row.querySelector(`#editor-${item.id}`); toggleBtn.addEventListener('click',()=>editor.classList.toggle('open')); row.querySelector(`[data-autofill-home="${item.id}"]`).addEventListener('click', async ()=>{ await autofillScorersFromScore(item.id, item.home); }); row.querySelector(`[data-autofill-away="${item.id}"]`).addEventListener('click', async ()=>{ await autofillScorersFromScore(item.id, item.away); }); const chips=row.querySelector(`#chips-${item.id}`); const totals=getScorerTotalsForMatch(item.id); chips.innerHTML=`<span class="chip">${item.home}: ${totals[item.home]||0}</span><span class="chip">${item.away}: ${totals[item.away]||0}</span>`; }); }
function createSnapshotHtml(){ const topOverall = getTopScorerOverall(); const topHeader = topOverall ? `Nejlepší střelec turnaje: ${escapeHtml(topOverall.name)} (${escapeHtml(topOverall.team)}) – ${topOverall.goals} gólů` : 'Nejlepší střelec turnaje: zatím není vyplněn'; return `<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ligový report</title><style>body{font-family:Arial,sans-serif;margin:24px;color:#111;background:#fff}.report-topline{margin:0 0 18px;font-size:14px;font-weight:700;color:#222}</style></head><body><h1>Ligový report</h1><div class="report-topline">${topHeader}</div></body></html>`; }
function exportPdf(){ const issues = validateScorersAgainstScores(); if(issues.length){ setStatus('Export do PDF byl zablokován: součet střelců nesedí se skóre u některých zápasů.', 'warn'); alert('Nelze exportovat do PDF. Opravte nejdřív střelce u zápasů:\n\n' + issues.join('\n')); return; } window.print(); }
function exportHtmlSnapshot(){ const issues = validateScorersAgainstScores(); if(issues.length){ setStatus('Export HTML byl zablokován: součet střelců nesedí se skóre u některých zápasů.', 'warn'); alert('Nelze exportovat HTML. Opravte nejdřív střelce u zápasů:\n\n' + issues.join('\n')); return; } const html = createSnapshotHtml(); const blob = new Blob([html], { type: 'text/html;charset=utf-8' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `liga-report-${new Date().toISOString().slice(0,10)}.html`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); setStatus('HTML stránka byla vytvořena a stažena.', 'ok'); }
document.getElementById('exportPdfBtn').addEventListener('click', exportPdf); document.getElementById('exportHtmlBtn').addEventListener('click', exportHtmlSnapshot);
renderScorers(); renderMatches();
</script>
</body>
</html>
