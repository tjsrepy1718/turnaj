<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TJ Sokol Řepy – turnaj</title>
  <style>
    :root{--bg:#f3f6f4;--card:#fff;--muted:#4a5a52;--text:#0f1a14;--accent:#0b7a3b;--line:#d8e2db;--gold:#c9a227;--silver:#9aa7a0;--bronze:#a06a4b}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fff,var(--bg));color:var(--text)}
    .wrap{max-width:1300px;margin:0 auto;padding:18px} .hero,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    .hero{padding:18px;margin-bottom:14px} h1{margin:0 0 6px;font-size:28px} h2{margin:0 0 10px;font-size:18px} .muted{color:var(--muted)} .small{font-size:12px;color:var(--muted)}
    .stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);padding:8px 12px;border-radius:999px;background:#f7faf8;white-space:nowrap}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}@media(min-width:1100px){.grid{grid-template-columns:1.05fr 1fr}} .card{padding:14px}
    .table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px;border:1px solid var(--line)} .table th,.table td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:center;font-size:13px}
    .table th{background:#f7faf8;font-weight:700} .table td.left{text-align:left}.table tr:nth-child(even) td{background:#f7faf8}
    .table tr.pos1 td{background:color-mix(in srgb,var(--gold) 25%,#fff)!important}.table tr.pos2 td{background:color-mix(in srgb,var(--silver) 25%,#fff)!important}.table tr.pos3 td{background:color-mix(in srgb,var(--bronze) 25%,#fff)!important}
    .matches{display:grid;gap:8px}.match{display:grid;grid-template-columns:95px 100px 1fr auto 1fr auto auto auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:10px;background:#f7faf8}
    .badge{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 8px;text-align:center;white-space:nowrap}.t1{text-align:right}.t2{text-align:left}.score{text-align:center;font-weight:700}
    .leader{display:flex;gap:10px;align-items:center;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:#f7faf8;margin-bottom:12px}.leader-icon{font-size:28px}.leader-name{font-size:18px;font-weight:700}
    .empty{padding:16px;border:1px dashed var(--line);border-radius:14px;background:#f7faf8;color:var(--muted)}
    @media(max-width:760px){.match{grid-template-columns:1fr 1fr}.t1,.t2,.score{text-align:left}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1 id="title">TJ Sokol Řepy – turnaj</h1>
    <div class="muted" id="subtitle">Veřejný přehled pro rodiče</div>
    <div class="stats" id="stats"></div>
    <div class="small" id="updated" style="margin-top:10px;"></div>
  </div>
  <div class="grid">
    <div>
      <div class="card">
        <h2>Tabulka</h2>
        <table class="table" id="standingsTable"><thead><tr><th>Poř.</th><th style="text-align:left;">Tým</th><th>Z</th><th>V</th><th>R</th><th>P</th><th>VG</th><th>OG</th><th>RG</th><th>Body</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="card" style="margin-top:14px;">
        <h2>Střelci gólů</h2>
        <div id="topScorer" class="leader"></div>
        <table class="table" id="scorersTable"><thead><tr><th>Poř.</th><th style="text-align:left;">Hráč</th><th style="text-align:left;">Tým</th><th>Góly</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
    <div class="card">
      <h2>Zápasy</h2>
      <div class="matches" id="matches"></div>
    </div>
  </div>
</div>
<script>
const esc=v=>String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[s]));
const fmtDate=iso=>{if(!iso)return'Bez data aktualizace';try{return new Date(iso).toLocaleString('cs-CZ')}catch(e){return iso}};
function renderStats(meta){const items=[['Týmy',meta.teamCount??0],['Zápasy',meta.matchCount??0],['Odehráno',meta.completedMatches??0],['Hřiště',meta.pitchCount??1],['Start',meta.startTime??'09:00']];
  document.getElementById('stats').innerHTML=items.map(([k,v])=>`<span class="pill"><b>${esc(k)}:</b> ${esc(v)}</span>`).join('');
  document.getElementById('updated').textContent='Poslední aktualizace: '+fmtDate(meta.updatedAt);
}
function renderStandings(rows){const tbody=document.querySelector('#standingsTable tbody');tbody.innerHTML='';if(!rows.length){tbody.innerHTML='<tr><td colspan="10" class="left">Zatím nejsou k dispozici žádná data.</td></tr>';return;}rows.forEach((r,i)=>{const tr=document.createElement('tr');if(i===0)tr.classList.add('pos1');if(i===1)tr.classList.add('pos2');if(i===2)tr.classList.add('pos3');tr.innerHTML=`<td>${esc(r.position)}</td><td class="left">${esc(r.team)}</td><td>${esc(r.played)}</td><td>${esc(r.wins)}</td><td>${esc(r.draws)}</td><td>${esc(r.losses)}</td><td>${esc(r.goalsFor)}</td><td>${esc(r.goalsAgainst)}</td><td>${esc(r.goalDifference)}</td><td><strong>${esc(r.points)}</strong></td>`;tbody.appendChild(tr);});}
function renderTopScorer(top){const box=document.getElementById('topScorer');if(!top){box.innerHTML='<div class="empty">Zatím nejsou zadaní žádní střelci.</div>';return;}box.innerHTML=`<div class="leader-icon">⚽</div><div><div class="small">Nejlepší střelec</div><div class="leader-name">${esc(top.name)}</div><div class="muted">${esc(top.team)} · ${esc(top.goals)} gólů</div></div>`;}
function renderScorers(rows){const tbody=document.querySelector('#scorersTable tbody');tbody.innerHTML='';if(!rows.length){tbody.innerHTML='<tr><td colspan="4" class="left">Zatím nejsou k dispozici žádní střelci.</td></tr>';return;}rows.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${esc(r.position)}</td><td class="left">${esc(r.name)}</td><td class="left">${esc(r.team)}</td><td><strong>${esc(r.goals)}</strong></td>`;tbody.appendChild(tr);});}
function renderMatches(rows){const box=document.getElementById('matches');if(!rows.length){box.innerHTML='<div class="empty">Zatím nejsou vygenerované žádné zápasy.</div>';return;}box.innerHTML=rows.map(m=>{const score=(Number.isFinite(m.homeScore)&&Number.isFinite(m.awayScore))?`${m.homeScore} : ${m.awayScore}`:'—';return `<div class="match"><div class="badge">${esc(m.start)}–${esc(m.end)}</div><div class="badge">Hřiště ${esc(m.pitch)}</div><div class="t1">${esc(m.home)}</div><div>vs</div><div class="t2">${esc(m.away)}</div><div class="score">${esc(score)}</div></div>`;}).join('');}
async function init(){try{const url='./public-data.json?v='+Date.now(); const res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status+' '+res.url);const data=await res.json();document.getElementById('title').textContent=data?.meta?.title||'TJ Sokol Řepy – turnaj';document.getElementById('subtitle').textContent=data?.meta?.subtitle||'Veřejný přehled pro rodiče';renderStats(data.meta||{});renderStandings(Array.isArray(data.standings)?data.standings:[]);renderTopScorer(data.topScorer||null);renderScorers(Array.isArray(data.scorers)?data.scorers:[]);renderMatches(Array.isArray(data.matches)?data.matches:[]);}catch(e){console.error(e);document.querySelector('.grid').innerHTML='<div class="card"><div class="empty">Data se nepodařilo načíst.</div></div>';}}
init();
</script>
</body></html>
